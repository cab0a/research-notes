name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-reproduce:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"

      - name: Run unit tests
        run: python -m pytest

      - name: Regenerate reference results
        run: |
          python experiments/run_laplacian_variance.py --output-dir regenerated-results
          python experiments/run_focus_metric_comparison.py --output-dir regenerated-results
          python experiments/run_local_blur_evaluation.py --output-dir regenerated-results
          python experiments/run_window_geometry_evaluation.py --output-dir regenerated-results
          python experiments/run_preprocessing_sensitivity.py --output-dir regenerated-results
          python experiments/run_optical_blur_models.py --output-dir regenerated-results
          python experiments/run_photometric_recompression.py --output-dir regenerated-results
          python experiments/run_jpeg_compression_history.py --output-dir regenerated-results
          python experiments/run_jpeg_codec_portability.py --output-dir regenerated-results
          python experiments/run_cross_platform_codec_contracts.py --output-dir regenerated-results --platform-label linux-x64-reference
          python experiments/run_cross_platform_codec_contracts.py --fixture-dir regenerated-fixtures/jpeg-decoder-contracts --output-dir regenerated-fixture-results --platform-label linux-x64-reference --refresh-fixtures
          python experiments/run_advanced_jpeg_syntax.py --output-dir regenerated-results --platform-label linux-x64-reference
          python experiments/run_advanced_jpeg_syntax.py --fixture-dir regenerated-fixtures/advanced-jpeg-syntax --output-dir regenerated-advanced-fixture-results --platform-label linux-x64-reference --refresh-fixtures
          python experiments/run_color_metadata_interpretation.py --output-dir regenerated-results --platform-label linux-x64-reference
          python experiments/run_color_metadata_interpretation.py --fixture-dir regenerated-fixtures/color-metadata-contracts --output-dir regenerated-metadata-fixture-results --platform-label linux-x64-reference --refresh-fixtures

      - name: Verify reference data and chart generation
        run: |
          diff -u results/laplacian_variance_summary.csv regenerated-results/laplacian_variance_summary.csv
          diff -u results/focus_metric_trials.csv regenerated-results/focus_metric_trials.csv
          diff -u results/focus_metric_summary.csv regenerated-results/focus_metric_summary.csv
          diff -u results/motion_blur_summary.csv regenerated-results/motion_blur_summary.csv
          diff -u results/resize_sensitivity_summary.csv regenerated-results/resize_sensitivity_summary.csv
          diff -u results/local_blur_observations.csv regenerated-results/local_blur_observations.csv
          diff -u results/local_blur_tiles.csv regenerated-results/local_blur_tiles.csv
          diff -u results/local_blur_aggregate.csv regenerated-results/local_blur_aggregate.csv
          diff -u results/window_geometry_windows.csv regenerated-results/window_geometry_windows.csv
          diff -u results/window_geometry_summary.csv regenerated-results/window_geometry_summary.csv
          diff -u results/window_noise_trials.csv regenerated-results/window_noise_trials.csv
          diff -u results/window_noise_summary.csv regenerated-results/window_noise_summary.csv
          diff -u results/low_texture_confounds.csv regenerated-results/low_texture_confounds.csv
          diff -u results/preprocessing_trials.csv regenerated-results/preprocessing_trials.csv
          diff -u results/preprocessing_response_summary.csv regenerated-results/preprocessing_response_summary.csv
          diff -u results/preprocessing_calibration_anchors.csv regenerated-results/preprocessing_calibration_anchors.csv
          diff -u results/preprocessing_calibration_summary.csv regenerated-results/preprocessing_calibration_summary.csv
          diff -u results/optical_blur_kernels.csv regenerated-results/optical_blur_kernels.csv
          diff -u results/optical_blur_trials.csv regenerated-results/optical_blur_trials.csv
          diff -u results/optical_blur_summary.csv regenerated-results/optical_blur_summary.csv
          diff -u results/motion_direction_summary.csv regenerated-results/motion_direction_summary.csv
          diff -u results/photometric_recompression_trials.csv regenerated-results/photometric_recompression_trials.csv
          diff -u results/photometric_recompression_response_summary.csv regenerated-results/photometric_recompression_response_summary.csv
          diff -u results/photometric_recompression_calibration_anchors.csv regenerated-results/photometric_recompression_calibration_anchors.csv
          diff -u results/photometric_recompression_calibration_summary.csv regenerated-results/photometric_recompression_calibration_summary.csv
          diff -u results/jpeg_history_trials.csv regenerated-results/jpeg_history_trials.csv
          diff -u results/jpeg_history_response_summary.csv regenerated-results/jpeg_history_response_summary.csv
          diff -u results/jpeg_history_calibration_anchors.csv regenerated-results/jpeg_history_calibration_anchors.csv
          diff -u results/jpeg_history_calibration_summary.csv regenerated-results/jpeg_history_calibration_summary.csv
          diff -u results/jpeg_codec_manifest.csv regenerated-results/jpeg_codec_manifest.csv
          diff -u results/jpeg_quality_table_sweep.csv regenerated-results/jpeg_quality_table_sweep.csv
          diff -u results/jpeg_quantization_tables.csv regenerated-results/jpeg_quantization_tables.csv
          diff -u results/jpeg_codec_trials.csv regenerated-results/jpeg_codec_trials.csv
          diff -u results/jpeg_encoder_agreement.csv regenerated-results/jpeg_encoder_agreement.csv
          diff -u results/jpeg_decoder_agreement.csv regenerated-results/jpeg_decoder_agreement.csv
          diff -u results/jpeg_codec_portability_summary.csv regenerated-results/jpeg_codec_portability_summary.csv
          diff -u results/jpeg_platform_codec_manifest.csv regenerated-results/jpeg_platform_codec_manifest.csv
          diff -u results/jpeg_decoded_pixel_observations.csv regenerated-results/jpeg_decoded_pixel_observations.csv
          diff -u results/jpeg_decoder_pair_observations.csv regenerated-results/jpeg_decoder_pair_observations.csv
          diff -u results/jpeg_decoded_pixel_summary.csv regenerated-results/jpeg_decoded_pixel_summary.csv
          diff -u results/jpeg_advanced_codec_manifest.csv regenerated-results/jpeg_advanced_codec_manifest.csv
          diff -u results/jpeg_advanced_decoder_observations.csv regenerated-results/jpeg_advanced_decoder_observations.csv
          diff -u results/jpeg_advanced_pairwise_differences.csv regenerated-results/jpeg_advanced_pairwise_differences.csv
          diff -u results/jpeg_advanced_syntax_equivalence.csv regenerated-results/jpeg_advanced_syntax_equivalence.csv
          diff -u results/jpeg_advanced_summary.csv regenerated-results/jpeg_advanced_summary.csv
          diff -u results/jpeg_metadata_codec_manifest.csv regenerated-results/jpeg_metadata_codec_manifest.csv
          diff -u results/jpeg_metadata_raw_observations.csv regenerated-results/jpeg_metadata_raw_observations.csv
          diff -u results/jpeg_metadata_policy_observations.csv regenerated-results/jpeg_metadata_policy_observations.csv
          diff -u results/jpeg_metadata_control_pairs.csv regenerated-results/jpeg_metadata_control_pairs.csv
          diff -u results/jpeg_metadata_summary.csv regenerated-results/jpeg_metadata_summary.csv
          diff -qr fixtures/jpeg-decoder-contracts regenerated-fixtures/jpeg-decoder-contracts
          diff -qr fixtures/advanced-jpeg-syntax regenerated-fixtures/advanced-jpeg-syntax
          diff -qr fixtures/color-metadata-contracts regenerated-fixtures/color-metadata-contracts
          test -s regenerated-results/laplacian_variance.png
          test -s regenerated-results/focus_metric_comparison.png
          test -s regenerated-results/local_blur_example.png
          test -s regenerated-results/local_blur_spatial_aggregation.png
          test -s regenerated-results/window_geometry_example.png
          test -s regenerated-results/window_geometry_robustness.png
          test -s regenerated-results/preprocessing_examples.png
          test -s regenerated-results/preprocessing_calibration_drift.png
          test -s regenerated-results/optical_blur_examples.png
          test -s regenerated-results/optical_blur_directional_sensitivity.png
          test -s regenerated-results/photometric_recompression_examples.png
          test -s regenerated-results/photometric_recompression_drift.png
          test -s regenerated-results/jpeg_history_examples.png
          test -s regenerated-results/jpeg_history_sensitivity.png
          test -s regenerated-results/jpeg_quantization_tables.png
          test -s regenerated-results/jpeg_codec_portability.png
          test -s regenerated-results/jpeg_decoded_pixel_contracts.png
          test -s regenerated-results/jpeg_advanced_codec_families.png
          test -s regenerated-results/jpeg_metadata_interpretation.png

  jpeg-decoder-contracts:
    name: JPEG contracts (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-x64-default
            os: ubuntu-24.04
            jsimd_forcenone: "0"
          - label: ubuntu-x64-scalar
            os: ubuntu-24.04
            jsimd_forcenone: "1"
          - label: windows-x64-default
            os: windows-2025
            jsimd_forcenone: "0"
          - label: macos-arm64-default
            os: macos-15
            jsimd_forcenone: "0"
          - label: macos-x64-default
            os: macos-15-intel
            jsimd_forcenone: "0"
    runs-on: ${{ matrix.os }}
    env:
      JSIMD_FORCENONE: ${{ matrix.jsimd_forcenone }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "."

      - name: Observe decoded-pixel contracts
        run: |
          python experiments/run_cross_platform_codec_contracts.py --output-dir platform-results --platform-label ${{ matrix.label }} --record-runner-image
          python experiments/run_advanced_jpeg_syntax.py --output-dir platform-results --platform-label ${{ matrix.label }} --record-runner-image
          python experiments/run_color_metadata_interpretation.py --output-dir platform-results --platform-label ${{ matrix.label }} --record-runner-image

      - name: Upload platform observations
        uses: actions/upload-artifact@v7
        with:
          name: jpeg-contract-${{ matrix.label }}
          path: platform-results
          retention-days: 30

  aggregate-jpeg-contracts:
    name: Aggregate JPEG contract matrix
    needs: jpeg-decoder-contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "."

      - name: Download platform observations
        uses: actions/download-artifact@v8
        with:
          pattern: jpeg-contract-*
          path: platform-artifacts

      - name: Aggregate cross-platform contracts
        run: |
          python experiments/summarize_cross_platform_codec_contracts.py --input-dir platform-artifacts --output-dir cross-platform-results --expected-platform-count 5 --emit-log-payload
          python experiments/summarize_advanced_jpeg_syntax.py --input-dir platform-artifacts --output-dir advanced-cross-platform-results --expected-platform-count 5 --emit-log-payload
          python experiments/summarize_color_metadata_contracts.py --input-dir platform-artifacts --output-dir metadata-cross-platform-results --expected-platform-count 5 --emit-log-payload

      - name: Verify committed cross-platform contracts
        run: |
          diff -u results/jpeg_cross_platform_observations.csv cross-platform-results/jpeg_cross_platform_observations.csv
          diff -u results/jpeg_cross_platform_decoder_pairs.csv cross-platform-results/jpeg_cross_platform_decoder_pairs.csv
          diff -u results/jpeg_cross_platform_contract_summary.csv cross-platform-results/jpeg_cross_platform_contract_summary.csv
          test -s cross-platform-results/jpeg_cross_platform_contracts.png
          diff -u results/jpeg_advanced_cross_platform_observations.csv advanced-cross-platform-results/jpeg_advanced_cross_platform_observations.csv
          diff -u results/jpeg_advanced_cross_platform_pairs.csv advanced-cross-platform-results/jpeg_advanced_cross_platform_pairs.csv
          diff -u results/jpeg_advanced_cross_platform_syntax_equivalence.csv advanced-cross-platform-results/jpeg_advanced_cross_platform_syntax_equivalence.csv
          diff -u results/jpeg_advanced_cross_platform_summary.csv advanced-cross-platform-results/jpeg_advanced_cross_platform_summary.csv
          diff -u results/jpeg_advanced_cross_platform_pair_summary.csv advanced-cross-platform-results/jpeg_advanced_cross_platform_pair_summary.csv
          test -s advanced-cross-platform-results/jpeg_advanced_cross_platform_codec_families.png
          diff -u results/jpeg_metadata_cross_platform_raw_observations.csv metadata-cross-platform-results/jpeg_metadata_cross_platform_raw_observations.csv
          diff -u results/jpeg_metadata_cross_platform_policy_observations.csv metadata-cross-platform-results/jpeg_metadata_cross_platform_policy_observations.csv
          diff -u results/jpeg_metadata_cross_platform_control_pairs.csv metadata-cross-platform-results/jpeg_metadata_cross_platform_control_pairs.csv
          diff -u results/jpeg_metadata_cross_platform_summary.csv metadata-cross-platform-results/jpeg_metadata_cross_platform_summary.csv
          test -s metadata-cross-platform-results/jpeg_metadata_cross_platform_interpretation.png

      - name: Upload cross-platform report
        uses: actions/upload-artifact@v7
        with:
          name: jpeg-contract-cross-platform-summary
          path: |
            cross-platform-results
            advanced-cross-platform-results
            metadata-cross-platform-results
          retention-days: 30
