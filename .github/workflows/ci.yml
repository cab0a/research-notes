name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-reproduce:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"

      - name: Run unit tests
        run: python -m pytest

      - name: Regenerate reference results
        run: |
          python experiments/run_laplacian_variance.py --output-dir regenerated-results
          python experiments/run_focus_metric_comparison.py --output-dir regenerated-results
          python experiments/run_local_blur_evaluation.py --output-dir regenerated-results
          python experiments/run_window_geometry_evaluation.py --output-dir regenerated-results
          python experiments/run_preprocessing_sensitivity.py --output-dir regenerated-results
          python experiments/run_optical_blur_models.py --output-dir regenerated-results
          python experiments/run_photometric_recompression.py --output-dir regenerated-results
          python experiments/run_jpeg_compression_history.py --output-dir regenerated-results

      - name: Verify reference data and chart generation
        run: |
          diff -u results/laplacian_variance_summary.csv regenerated-results/laplacian_variance_summary.csv
          diff -u results/focus_metric_trials.csv regenerated-results/focus_metric_trials.csv
          diff -u results/focus_metric_summary.csv regenerated-results/focus_metric_summary.csv
          diff -u results/motion_blur_summary.csv regenerated-results/motion_blur_summary.csv
          diff -u results/resize_sensitivity_summary.csv regenerated-results/resize_sensitivity_summary.csv
          diff -u results/local_blur_observations.csv regenerated-results/local_blur_observations.csv
          diff -u results/local_blur_tiles.csv regenerated-results/local_blur_tiles.csv
          diff -u results/local_blur_aggregate.csv regenerated-results/local_blur_aggregate.csv
          diff -u results/window_geometry_windows.csv regenerated-results/window_geometry_windows.csv
          diff -u results/window_geometry_summary.csv regenerated-results/window_geometry_summary.csv
          diff -u results/window_noise_trials.csv regenerated-results/window_noise_trials.csv
          diff -u results/window_noise_summary.csv regenerated-results/window_noise_summary.csv
          diff -u results/low_texture_confounds.csv regenerated-results/low_texture_confounds.csv
          diff -u results/preprocessing_trials.csv regenerated-results/preprocessing_trials.csv
          diff -u results/preprocessing_response_summary.csv regenerated-results/preprocessing_response_summary.csv
          diff -u results/preprocessing_calibration_anchors.csv regenerated-results/preprocessing_calibration_anchors.csv
          diff -u results/preprocessing_calibration_summary.csv regenerated-results/preprocessing_calibration_summary.csv
          diff -u results/optical_blur_kernels.csv regenerated-results/optical_blur_kernels.csv
          diff -u results/optical_blur_trials.csv regenerated-results/optical_blur_trials.csv
          diff -u results/optical_blur_summary.csv regenerated-results/optical_blur_summary.csv
          diff -u results/motion_direction_summary.csv regenerated-results/motion_direction_summary.csv
          diff -u results/photometric_recompression_trials.csv regenerated-results/photometric_recompression_trials.csv
          diff -u results/photometric_recompression_response_summary.csv regenerated-results/photometric_recompression_response_summary.csv
          diff -u results/photometric_recompression_calibration_anchors.csv regenerated-results/photometric_recompression_calibration_anchors.csv
          diff -u results/photometric_recompression_calibration_summary.csv regenerated-results/photometric_recompression_calibration_summary.csv
          diff -u results/jpeg_history_trials.csv regenerated-results/jpeg_history_trials.csv
          diff -u results/jpeg_history_response_summary.csv regenerated-results/jpeg_history_response_summary.csv
          diff -u results/jpeg_history_calibration_anchors.csv regenerated-results/jpeg_history_calibration_anchors.csv
          diff -u results/jpeg_history_calibration_summary.csv regenerated-results/jpeg_history_calibration_summary.csv
          test -s regenerated-results/laplacian_variance.png
          test -s regenerated-results/focus_metric_comparison.png
          test -s regenerated-results/local_blur_example.png
          test -s regenerated-results/local_blur_spatial_aggregation.png
          test -s regenerated-results/window_geometry_example.png
          test -s regenerated-results/window_geometry_robustness.png
          test -s regenerated-results/preprocessing_examples.png
          test -s regenerated-results/preprocessing_calibration_drift.png
          test -s regenerated-results/optical_blur_examples.png
          test -s regenerated-results/optical_blur_directional_sensitivity.png
          test -s regenerated-results/photometric_recompression_examples.png
          test -s regenerated-results/photometric_recompression_drift.png
          test -s regenerated-results/jpeg_history_examples.png
          test -s regenerated-results/jpeg_history_sensitivity.png
